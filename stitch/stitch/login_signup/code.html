<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#001c8e",
              "on-surface-variant": "#aaaab7",
              "secondary": "#ff6e85",
              "outline": "#737580",
              "on-secondary-container": "#fff6f5",
              "surface-container-high": "#1c1f2b",
              "on-background": "#f0f0fd",
              "on-tertiary": "#3c0048",
              "primary-fixed": "#8999ff",
              "on-primary-container": "#001470",
              "surface-container": "#171924",
              "error-dim": "#d73357",
              "on-secondary": "#480014",
              "secondary-dim": "#e70052",
              "surface": "#0c0e17",
              "surface-container-highest": "#222532",
              "surface-container-low": "#11131d",
              "primary": "#9ba8ff",
              "error-container": "#a70138",
              "surface-bright": "#282b3a",
              "outline-variant": "#464752",
              "background": "#0c0e17",
              "inverse-on-surface": "#53545f",
              "inverse-primary": "#2949ef",
              "secondary-fixed-dim": "#ffaeb6",
              "error": "#ff6e84",
              "on-error-container": "#ffb2b9",
              "surface-container-lowest": "#000000",
              "tertiary-dim": "#c500e6",
              "on-tertiary-container": "#000000",
              "surface-dim": "#0c0e17",
              "surface-variant": "#222532",
              "tertiary-fixed": "#f189ff",
              "surface-tint": "#9ba8ff",
              "on-surface": "#f0f0fd",
              "on-secondary-fixed-variant": "#a40037",
              "on-secondary-fixed": "#6e0022",
              "tertiary-fixed-dim": "#eb71ff",
              "inverse-surface": "#faf8ff",
              "secondary-fixed": "#ffc2c7",
              "primary-dim": "#4963ff",
              "on-tertiary-fixed-variant": "#650077",
              "primary-fixed-dim": "#778aff",
              "on-primary-fixed-variant": "#001a88",
              "secondary-container": "#bd0041",
              "tertiary": "#e966ff",
              "on-error": "#490013",
              "on-primary-fixed": "#000000",
              "tertiary-container": "#d501f9",
              "on-tertiary-fixed": "#2f0039",
              "primary-container": "#8999ff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-bg {
            background: rgba(34, 37, 50, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .bg-mesh {
            background-color: #0c0e17;
            background-image: 
                radial-gradient(at 0% 0%, rgba(73, 99, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(197, 0, 230, 0.15) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-mesh font-body text-on-surface min-h-screen flex flex-col selection:bg-tertiary/30">
<!-- Top Navigation Bar (Shared Component Logic - Suppression applied as this is Transactional) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-8">
<div class="font-headline font-extrabold text-2xl tracking-tighter text-primary">ChatSnap</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant/15">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="help">help</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-md space-y-12">
<!-- Branding/Identity Section -->
<div class="space-y-4">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 border border-primary/20 text-primary text-[10px] uppercase tracking-[0.2em] font-bold">
                    Secure Protocol v2.0
                </div>
<h1 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tight leading-tight">
                    Welcome <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-tertiary">Back</span>
</h1>
<p class="text-on-surface-variant text-lg max-w-[280px] leading-relaxed">
                    Enter your phone number to get started
                </p>
</div>
<!-- Input Form Section -->
<div class="space-y-8">
<div class="group relative">
<div class="flex items-center gap-4 p-5 rounded-2xl bg-surface-container-low border border-outline-variant/10 focus-within:border-primary/40 focus-within:bg-surface-container transition-all duration-300">
<!-- Country Code Picker -->
<div class="flex items-center gap-2 px-3 py-2 bg-surface-container-highest rounded-xl cursor-pointer hover:bg-surface-bright transition-colors border border-outline-variant/5">
<img class="w-5 h-5 rounded-sm object-cover" data-alt="Small rectangular icon of the United States flag representing the country code selection" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBH55rgFijME5u2vZyqNZktGXsfuxmDj8-MGlJk70pjbap0DhW1Q_q8BtdSSTYxCf1AlFHlTlLBwwOLceZCNYPNlQrMy0mmIEDu9P2SjU4cGqpntSs6ix8t-diYl_9kCcZOed-nb1aU8jhAqFgdibK9R69PQ_v3GDtsFiehA-fOjPGUbmS0KW0bUS0qp3E2TnY3iI2MJiy2XDG_DAHTfU4_9DmLe_pENJTdhw-9qPq_M1AxyRsJbbElJNyfJeXDUon1jdDpBrJNLH8"/>
<span class="font-bold text-on-surface text-sm">+1</span>
<span class="material-symbols-outlined text-xs text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
<!-- Phone Input -->
<div class="flex-grow">
<label class="block text-[10px] uppercase tracking-widest text-outline font-bold mb-1 ml-1">Mobile Number</label>
<input class="w-full bg-transparent border-none p-0 text-xl font-medium focus:ring-0 placeholder:text-outline-variant/40" placeholder="000 000 0000" type="tel"/>
</div>
</div>
<!-- Decorative subtle glow -->
<div class="absolute -inset-1 bg-gradient-to-r from-primary/20 to-tertiary/20 rounded-2xl blur-xl opacity-0 group-focus-within:opacity-100 transition-opacity duration-500 -z-10"></div>
</div>
<!-- Primary Action -->
<button class="w-full py-5 rounded-full bg-gradient-to-br from-primary-dim to-tertiary-dim text-white font-headline font-bold text-lg shadow-[0_20px_40px_rgba(73,99,255,0.25)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3">
                    Send OTP
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Social/Alternative Logic (Bento Minimal) -->
<div class="pt-4">
<div class="flex items-center gap-4 mb-8">
<div class="h-px flex-grow bg-outline-variant/20"></div>
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">or connect with</span>
<div class="h-px flex-grow bg-outline-variant/20"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-4 rounded-2xl bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="mail">mail</span>
<span class="text-xs font-bold uppercase tracking-wider">Email</span>
</button>
<button class="flex items-center justify-center gap-3 py-4 rounded-2xl bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-tertiary" data-icon="passkey">passkey</span>
<span class="text-xs font-bold uppercase tracking-wider">Passkey</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer Identity -->
<footer class="mt-auto w-full px-8 py-10 text-center">
<p class="text-on-surface-variant text-[11px] font-medium leading-relaxed max-w-xs mx-auto opacity-60">
            By signing up, you agree to our <a class="text-primary hover:underline decoration-primary/30 underline-offset-4" href="#">Terms</a> and <a class="text-primary hover:underline decoration-primary/30 underline-offset-4" href="#">Privacy Policy</a>
</p>
</footer>
<!-- Bottom Decorative Glows -->
<div class="fixed bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-surface to-transparent -z-20 pointer-events-none"></div>
</body></html>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#001c8e",
              "on-surface-variant": "#aaaab7",
              "secondary": "#ff6e85",
              "outline": "#737580",
              "on-secondary-container": "#fff6f5",
              "surface-container-high": "#1c1f2b",
              "on-background": "#f0f0fd",
              "on-tertiary": "#3c0048",
              "primary-fixed": "#8999ff",
              "on-primary-container": "#001470",
              "surface-container": "#171924",
              "error-dim": "#d73357",
              "on-secondary": "#480014",
              "secondary-dim": "#e70052",
              "surface": "#0c0e17",
              "surface-container-highest": "#222532",
              "surface-container-low": "#11131d",
              "primary": "#9ba8ff",
              "error-container": "#a70138",
              "surface-bright": "#282b3a",
              "outline-variant": "#464752",
              "background": "#0c0e17",
              "inverse-on-surface": "#53545f",
              "inverse-primary": "#2949ef",
              "secondary-fixed-dim": "#ffaeb6",
              "error": "#ff6e84",
              "on-error-container": "#ffb2b9",
              "surface-container-lowest": "#000000",
              "tertiary-dim": "#c500e6",
              "on-tertiary-container": "#000000",
              "surface-dim": "#0c0e17",
              "surface-variant": "#222532",
              "tertiary-fixed": "#f189ff",
              "surface-tint": "#9ba8ff",
              "on-surface": "#f0f0fd",
              "on-secondary-fixed-variant": "#a40037",
              "on-secondary-fixed": "#6e0022",
              "tertiary-fixed-dim": "#eb71ff",
              "inverse-surface": "#faf8ff",
              "secondary-fixed": "#ffc2c7",
              "primary-dim": "#4963ff",
              "on-tertiary-fixed-variant": "#650077",
              "primary-fixed-dim": "#778aff",
              "on-primary-fixed-variant": "#001a88",
              "secondary-container": "#bd0041",
              "tertiary": "#e966ff",
              "on-error": "#490013",
              "on-primary-fixed": "#000000",
              "tertiary-container": "#d501f9",
              "on-tertiary-fixed": "#2f0039",
              "primary-container": "#8999ff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0c0e17;
            margin: 0;
            overflow: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface select-none">
<!-- Splash Canvas -->
<main class="relative flex flex-col items-center justify-center min-h-screen w-full bg-surface overflow-hidden">
<!-- Ambient Background Glows -->
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-tertiary/10 blur-[120px]"></div>
<div class="absolute top-[20%] right-[5%] w-[30%] h-[30%] rounded-full bg-secondary/5 blur-[80px]"></div>
<!-- Central Identity Cluster -->
<div class="relative z-10 flex flex-col items-center gap-8">
<!-- Logo Construction (Chat Bubble + Snap Shutter) -->
<div class="relative w-32 h-32 flex items-center justify-center group">
<!-- Outer Glass Ring -->
<div class="absolute inset-0 rounded-xl bg-surface-container-highest/40 backdrop-blur-md border border-outline-variant/15 rotate-12 transition-transform duration-700 group-hover:rotate-0"></div>
<!-- Main Logo Body -->
<div class="relative w-24 h-24 bg-gradient-to-br from-primary-dim via-tertiary-dim to-secondary-dim rounded-xl flex items-center justify-center shadow-[0_0_40px_rgba(155,168,255,0.25)]">
<!-- Shutter/Lens Icon Integration -->
<div class="relative flex items-center justify-center">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">
                            chat_bubble
                        </span>
<div class="absolute flex items-center justify-center bg-surface-container-lowest w-8 h-8 rounded-full border-2 border-primary-container">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1; font-weight: 800;">shutter_speed</span>
</div>
</div>
</div>
<!-- Decorative Orbit -->
<div class="absolute -bottom-2 -right-2 w-8 h-8 bg-surface-bright rounded-full flex items-center justify-center border border-outline-variant/20 shadow-xl">
<span class="material-symbols-outlined text-tertiary text-sm" style="font-variation-settings: 'FILL' 1;">
                        auto_awesome
                    </span>
</div>
</div>
<!-- Brand Typography -->
<div class="flex flex-col items-center gap-1">
<h1 class="font-headline font-extrabold text-5xl tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-on-surface via-primary-fixed to-on-surface">
                    ChatSnap
                </h1>
<p class="font-body text-xs uppercase tracking-[0.4em] text-on-surface-variant font-semibold">
                    Electric Intimacy
                </p>
</div>
</div>
<!-- Loading Indicator / Footer -->
<div class="absolute bottom-20 flex flex-col items-center gap-6 w-full px-12">
<!-- Smooth Progress Bar Container -->
<div class="w-full max-w-[240px] h-[6px] bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full w-2/3 bg-gradient-to-r from-primary to-tertiary rounded-full shadow-[0_0_12px_rgba(155,168,255,0.4)]"></div>
</div>
<span class="font-label text-[10px] text-outline tracking-widest uppercase">
                Synchronizing Protocol
            </span>
</div>
<!-- Semantic Meta-Information (Visual Anchors) -->
<div class="absolute bottom-8 flex items-center gap-2 opacity-30">
<span class="material-symbols-outlined text-on-surface-variant text-sm">
                security
            </span>
<span class="text-[9px] font-label text-on-surface-variant uppercase tracking-widest">
                End-to-End Encrypted Snapshots
            </span>
</div>
</main>
<!-- Hidden Grid Pattern for Texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03]" data-alt="subtle radial grid pattern with tiny glowing points on a deep nocturnal canvas" style="background-image: radial-gradient(circle at 2px 2px, #9ba8ff 1px, transparent 0); background-size: 40px 40px;">
</div>
</body></html>

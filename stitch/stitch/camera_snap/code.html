<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "on-secondary": "#480014",
              "secondary-dim": "#e70052",
              "surface": "#0c0e17",

              "surface-container-low": "#11131d",
              "primary": "#9ba8ff",
              "error-container": "#a70138",
              "surface-bright": "#282b3a",

              "background": "#0c0e17",
              "inverse-on-surface": "#53545f",
              "inverse-primary": "#2949ef",
              "secondary-fixed-dim": "#ffaeb6",
              "error": "#ff6e84",
              "on-error-container": "#ffb2b9",
              "surface-container-lowest": "#000000",
              "tertiary-dim": "#c500e6",
              "on-tertiary-container": "#000000",
              "surface-dim": "#0c0e17",
              "surface-variant": "#222532",
              "tertiary-fixed": "#f189ff",
              "surface-tint": "#9ba8ff",
              "on-surface": "#f0f0fd",
              "on-secondary-fixed-variant": "#a40037",
              "on-secondary-fixed": "#6e0022",
              "tertiary-fixed-dim": "#eb71ff",
              "inverse-surface": "#faf8ff",
              "secondary-fixed": "#ffc2c7",
              "primary-dim": "#4963ff",
              "on-tertiary-fixed-variant": "#650077",
              "primary-fixed-dim": "#778aff",
              "on-primary-fixed-variant": "#001a88",
              "secondary-container": "#bd0041",
              "tertiary": "#e966ff",
              "on-error": "#490013",
              "on-primary-fixed": "#000000",
              "tertiary-container": "#d501f9",
              "on-tertiary-fixed": "#2f0039",
              "primary-container": "#8999ff"

            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .capture-ring {
            background: linear-gradient(135deg, #4963ff 0%, #c500e6 100%);
            padding: 4px;
        }
        .glass-panel {
            background: rgba(17, 19, 29, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Main Viewport (Full Screen Camera) -->
<main class="relative h-screen w-full flex flex-col overflow-hidden">
<!-- Camera Viewfinder Placeholder -->
<div class="absolute inset-0 z-0">
<img alt="Camera Viewfinder" class="w-full h-full object-cover" data-alt="cinematic low angle view of neon-lit city street at night with futuristic purple and blue reflections on wet pavement" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAo9YQYKwtKaC95QlHzuqobkQOEiI10N54K_7WTyn-S-6YK2mjeUkyTfxYPHAXwMNO55Sm75q3TFKDQDqzY6t-Hi8jiMyJsSiF0ubXVsQw9MWJVRoVBSmTTMikuI_FMP4c7xr-86nVoE_h3fiFeUN2hBdanwvLCFCTNxWcxYS56ZOJRj1_zWWQDLEOntNe7qZn8DWhFbZxOMIVmocAMpRZEZSQ6WJ_91J9EXf5esIBAWML6scumbZU-eJJZy8hEAb4vo0gahrrrbmQ"/>
<!-- Subtle Overlay for depth -->
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>
</div>
<!-- Top Navigation Bar (Shared Component Strategy) -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-8">
<!-- Leading: Profile Avatar (From JSON TopAppBar logic) -->
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full overflow-hidden border-2 border-primary/20 scale-95 active:scale-90 transition-transform">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="portrait of a stylish young man with a cool expression wearing a dark techwear jacket in soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuArU5UySX6Utj71i-AT-bh3OivwkbyZOcU0XznxTx4Gkae4RuDVKezQuvdRifIUMMZMhBiJAp0FL0JXjXKZfU2n3p6JE-6cIer6zfcjNUpSQoSpsDj05xl1vNFu_dnUeJcz9pVqRWNLoqJ7YI8moazGig3LCijeDe8UQHuIAuZjogWVBol732iElV7q9HeydCSvFXLvxjIgjd1ddw26IGHIWGpO_YJwCWYYWfXdPYmo7b-HbTLO2WlQDWcZeJDbBMSp2hfnvK6GXGA"/>
</div>
</div>
<!-- Trailing: Camera Controls -->
<div class="flex items-center gap-3">
<button class="w-12 h-12 glass-panel flex items-center justify-center rounded-full text-white hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined">flash_on</span>
</button>
<button class="w-12 h-12 glass-panel flex items-center justify-center rounded-full text-white hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined">flip_camera_ios</span>
</button>
<button class="w-12 h-12 glass-panel flex items-center justify-center rounded-full text-white hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</nav>
<!-- Dynamic Content: Snap Overlays & Features -->
<div class="relative z-10 flex-grow flex flex-col justify-end pb-32">
<!-- Contextual Tooltip (Appears on Hover/Intent) -->
<div class="self-center mb-8 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
<div class="glass-panel px-6 py-3 rounded-full">
<span class="font-headline font-bold text-sm tracking-widest uppercase text-white">Hold to Snap</span>
</div>
</div>
<!-- Bottom Control Cluster -->
<div class="flex items-center justify-between px-8 w-full">
<!-- Left: Timer Selection -->
<div class="flex flex-col gap-2 glass-panel p-1.5 rounded-full items-center">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-xs font-bold transition-all text-slate-400 hover:text-white">
                        OFF
                    </button>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-xs font-bold transition-all bg-gradient-to-br from-primary-dim to-tertiary-dim text-white shadow-[0_0_15px_rgba(155,168,255,0.4)]">
                        5s
                    </button>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-xs font-bold transition-all text-slate-400 hover:text-white">
                        10s
                    </button>
</div>
<!-- Center: Capture Button -->
<div class="relative group">
<div class="capture-ring rounded-full transition-transform duration-300 group-hover:scale-110">
<button class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform">
<div class="w-16 h-16 border-4 border-surface/10 rounded-full"></div>
</button>
</div>
<!-- Long Press / Send Snap Hint -->
<div class="absolute -top-16 left-1/2 -translate-x-1/2 pointer-events-none whitespace-nowrap bg-surface-variant/80 backdrop-blur-md px-4 py-2 rounded-xl scale-0 group-hover:scale-100 transition-all">
<span class="text-xs font-headline font-extrabold text-primary">SEND SNAP</span>
</div>
</div>
<!-- Right: Gallery Access -->
<button class="w-14 h-14 glass-panel rounded-2xl flex items-center justify-center text-white border border-white/10 hover:border-primary/40 transition-all active:scale-95 overflow-hidden">
<img alt="Gallery Preview" class="absolute inset-0 w-full h-full object-cover opacity-60" data-alt="abstract artistic background with swirling fluid shapes in deep violet, indigo and neon pink" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTUwLi-zPA-A0LbN4oUjoEwu0Knb_qq_CE0YZBUIzy7nrbmhnbsjDpBLP2MNmcv2-Cb51EvR0b1Gb30mwl1A11ZNtTEcvyJSSwzJY8ZyaG_wjScYekK8FxMIv8d0_zDgNw6fxqTBkJwWDQu-vJjwFP1B1qgWr5ZxldaTsyNEyqFxutPRaXUw3Ua0aIzsw07qc9k0_vkhHt5IxMba5rIaOX26w6pXfzcbNp9KsJWH0BqtuCM3sQOiq-v-q9EMOgkOA4ZYdsaoFZNPU"/>
<span class="material-symbols-outlined relative z-10 text-2xl">photo_library</span>
</button>
</div>
</div>
<!-- Bottom Navigation Bar (Shared Component: PHOTO_CAMERA ACTIVE) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 py-4 bg-[#11131d]/60 backdrop-blur-2xl rounded-t-[3rem] pb-safe shadow-[0_-4px_24px_rgba(0,0,0,0.4)]">
<!-- Tab: Chat -->
<button class="flex items-center justify-center text-slate-500 w-12 h-12 hover:text-[#e966ff] transition-all scale-110 active:scale-95">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
</button>
<!-- Tab: Camera (ACTIVE STATE) -->
<button class="flex items-center justify-center bg-gradient-to-br from-[#4963ff] to-[#c500e6] text-white rounded-full w-12 h-12 shadow-[0_0_20px_rgba(155,168,255,0.3)] transition-all scale-110 active:scale-95">
<span class="material-symbols-outlined" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
<!-- Tab: Stories -->
<button class="flex items-center justify-center text-slate-500 w-12 h-12 hover:text-[#e966ff] transition-all scale-110 active:scale-95">
<span class="material-symbols-outlined" data-icon="auto_awesome_motion">auto_awesome_motion</span>
</button>
<!-- Tab: Profile -->
<button class="flex items-center justify-center text-slate-500 w-12 h-12 hover:text-[#e966ff] transition-all scale-110 active:scale-95">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</nav>
<!-- Viewport Effects (Vignette) -->
<div class="fixed inset-0 pointer-events-none ring-[120px] ring-inset ring-black/10"></div>
</main>
<!-- Sidebar Quick-Tools (Editorial Voice) -->
<div class="fixed right-6 top-1/2 -translate-y-1/2 flex flex-col gap-6 z-20">
<div class="flex flex-col items-center gap-2 group">
<button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-sm">music_note</span>
</button>
<span class="text-[10px] font-bold uppercase tracking-tighter text-white/40 group-hover:text-primary transition-colors">Music</span>
</div>
<div class="flex flex-col items-center gap-2 group">
<button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-sm">auto_fix_high</span>
</button>
<span class="text-[10px] font-bold uppercase tracking-tighter text-white/40 group-hover:text-primary transition-colors">Lenses</span>
</div>
<div class="flex flex-col items-center gap-2 group">
<button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-sm">grid_view</span>
</button>
<span class="text-[10px] font-bold uppercase tracking-tighter text-white/40 group-hover:text-primary transition-colors">Grid</span>
</div>
</div>
</body></html>
